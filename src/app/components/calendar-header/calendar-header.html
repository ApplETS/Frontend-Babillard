<header class="flex flex-row justify-between items-center">
	<div class="flex items-center gap-4 basis-1/3">
		<button type="button" class="btn btn-sm" (click)="handleDateChange(CalendarAction.previous)">
			<fa-icon [icon]="faChevronLeft" />
		</button>
		<p className="text-lg">
			{{viewType()}}
		</p>
		<button type="button" class="btn btn-sm" (click)="handleDateChange(CalendarAction.next)">
			<fa-icon [icon]="faChevronRight" />
    </button>
		<button type="button" class="btn btn-sm" (click)="handleDateChange(CalendarAction.today)">
		  <fa-icon [icon]="faCalendarDay" />
    </button>
	</div>
	<div class="flex justify-center basis-1/3">
		<div class="tabs tabs-boxed" role="tablist">
			<a role="tab" class="tab" [class.tab-active]="viewType() === TimeGridType.month" (click)="handleViewChange(TimeGridType.month)"
      >
      Month
			</a>
			<a
				role="tab"
				class="tab"
        [class.tab-active]="viewType() === TimeGridType.week"
				(click)="handleViewChange(TimeGridType.week)">
			  Week
			</a>
			<a
			  role="tab"
        class="tab" [class.tab-active]="viewType() === TimeGridType.day"
				(click)="handleViewChange(TimeGridType.day)">
						Day
			</a>
		</div>
	</div>
	<div class="flex flex-row mb-1 basis-1/3 justify-end">
				<app-drop-down-select
					[title]="'a'"
          [options]="[]"
          ()
				/>
	</div>
</header>
