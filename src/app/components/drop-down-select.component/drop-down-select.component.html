<div class="flex items-center space-x-4">
	<div className="dropdown relative">
		<button className="m-1 btn flex items-center btn-outline btn-accent" (click)="toggleDropdown()">
			<fa-icon [icon]="filter" />
			{{ title }}
			<fa-icon [icon]="isDropdownOpen ? chevronUp : chevronDown" class="w-5 ml-2" />
    </button>
    @if (isDropdownOpen) {
			<ul class="p-2 shadow-xl menu bg-base-200 rounded-box absolute z-10 min-w-[300px]">
        @for (item of options; track item.key) {
          <li class="flex">
            <a class="flex items-center justify-start space-x-2" (click)="toggleOption(item)">
              <input type="checkbox" class="checkbox w-5 h-5" [checked]="item.value" />
              <span>{{item}}</span>
            </a>
          </li>				
        }
			</ul>
    }
  </div>
</div>
