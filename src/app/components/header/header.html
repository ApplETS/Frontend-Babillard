<div class="navbar w-full bg-base-300">

  <div class="flex-1 ml-5 gap-3"></div>
  <div class="flex-none gap-2 inline-flex items-center">
    <div class="btn btn-ghost btn-circle">
      <label class="swap swap-flip text-base text-base-content">
        <input type="checkbox" checked="">
        <div class="swap-on">EN</div>
        <div class="swap-off">FR</div>
      </label>
    </div>
    <app-theme-switcher></app-theme-switcher>
    <div class="divider divider-horizontal before:bg-base-content after:bg-base-content my-2"></div>
    <div class="mr-5">
      <button type="button" class="btn btn-ghost">
        <div class="text-base mr-1">Se connecter</div>
        <div class="avatar rounded-full bg-base-100">
          <fa-icon [icon]="signIn"></fa-icon>
        </div>
      </button>
    </div>
  </div>
</div>
